<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water Mission</title>

<link href="https://fonts.googleapis.com/css2?family=Germania+One&family=Itim&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 0;
    background-image: url("https://img.sanishtech.com/u/1f3a4adc59bcc4879d5c31502bb8d319.png"); 
    background-size: cover;      
    background-position: center;  
    background-repeat: no-repeat; 
}

.mission-section{
    width:90%;
    max-width:1000px;
    text-align:center;
}

.mission-title{
    font-family: 'Germania One', cursive;
    color:white;
    font-size:48px;
    margin-bottom:40px;
    letter-spacing:1px;
    text-shadow: 0 4px 10px rgba(0,0,0,0.5);
}

.mission-box{
    background: rgba(255, 255, 255, 0.93);
    border-radius: 30px;
    padding: 80px 50px; 
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 50px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    min-height: 400px; 
}

.mission-image{
    width: 320px; 
    height: 240px;
    object-fit: cover;
    border-radius: 20px;
}

.mission-text{
    flex: 1;
    text-align: left;
}

.mission-text p{
    font-family: 'Itim', cursive;
    font-size: 26px; 
    color: #0f4c5c;
    line-height: 1.4;
}
</style>
</head>

<body>

<div class="mission-section">
    <h1 class="mission-title">Use low-flow water fixtures</h1>

    <div class="mission-box">
        <img src="https://image2url.com/r2/default/images/1771785633322-147d8e31-d3d5-4554-ba8c-2754e3ab732a.jpeg" 
             alt="Low-flow fixture" 
             class="mission-image">

        <div class="mission-text">
            <p>
                <b>Low-flow taps and showers reduce water use without reducing comfort.</b>
            </p>
        </div>
    </div>
</div>

</body>
</html>
