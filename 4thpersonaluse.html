<!DOCTYPE html>

<link href="https://fonts.googleapis.com/css2?family=Germania+One&family=Itim&display=swap" rel="stylesheet">

<style>

*{ margin:0; padding:0; box-sizing:border-box; }
body{

    background-size: cover; background-position: center; background-repeat: no-repeat;

    background: rgba(255, 255, 255, 0.93); border-radius: 30px; padding: 80px 50px;

<body>

<div class="mission-section">
    <h1 class="mission-title">Clean Using a Bucket, Not a Hose</h1>
