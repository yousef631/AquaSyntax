<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water Mission</title>

<link href="https://fonts.googleapis.com/css2?family=Germania+One&family=Itim&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 0;
    background-image: url("https://img.sanishtech.com/u/1f3a4adc59bcc4879d5c31502bb8d319.png"); 
    background-size: cover; /* Changed to cover for better fit */
    background-position: center;  
    background-repeat: no-repeat; 
}

.mission-section{
    width:90%;
    max-width:1000px;
    text-align:center;
}

.mission-title{
    font-family: 'Germania One', cursive;
    color:white;
    font-size:48px; /* Slightly larger */
    margin-bottom:40px;
    letter-spacing:1px;
    text-shadow: 0 4px 10px rgba(0,0,0,0.5);
}

.mission-box{
    background: rgba(255, 255, 255, 0.93);
    border-radius: 30px;
    /* Increased padding (80px top/bottom) makes the rectangle much taller */
    padding: 80px 50px; 
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 50px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    min-height: 400px; /* Ensures a substantial height regardless of content */
}

.mission-image{
    width: 320px; /* Scaled up to match the taller box */
    height: 240px;
    object-fit: cover;
    border-radius: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.mission-text{
    flex: 1;
    text-align: left;
}

.mission-text p{
    font-family: 'Itim', cursive; /* Applied Itim here */
    font-size: 26px; /* Larger font for the larger box */
    color: #0f4c5c;
    line-height: 1.4;
}
</style>
</head>

<body>

<div class="mission-section">
    <h1 class="mission-title">Close the Tap When Not in Use</h1>

    <div class="mission-box">
        <img src="c:\Users\yahme\Downloads\Frontend-20260501T114705Z-3-001\Frontend\tap.png" 
             alt="Turning off tap" 
             class="mission-image">

        <div class="mission-text">
            <p>
                <b>Turn off the tap while brushing or soaping your hands. 
                Every second counts. </b>
            </p>
        </div>
    </div>
</div>

</body>
</html>
